name: HELEP CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── 1. Lint & static analysis ─────────────────────────────────────────────
  lint:
    name: Lint Python services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linters
        run: pip install flake8 mypy

      - name: Flake8
        run: flake8 services/ --max-line-length=120 --ignore=E501,W503

  # ── 2. Unit / smoke tests ─────────────────────────────────────────────────
  test:
    name: Service smoke tests
    runs-on: ubuntu-latest
    needs: lint
    services:
      kafka:
        image: apache/kafka:3.7.0
        ports: ["9092:9092"]
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          CLUSTER_ID: "5L6g3nShT-eMCtK--X86sw"
        options: --health-cmd "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list" --health-interval 10s --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install user-service deps
        run: pip install -r services/user-service/requirements.txt pytest httpx

      - name: Run user-service tests
        env:
          KAFKA_BOOTSTRAP: localhost:9092
          JWT_SECRET: test-secret
          DB_PATH: /tmp/user-test.db
          SERVICE_PORT: "8001"
        run: |
          cd services/user-service
          python -c "from app.events import CircuitBreaker; cb = CircuitBreaker(2, 1.0); assert cb.allow(); cb.record_failure(); cb.record_failure(); assert not cb.allow(); print('CircuitBreaker: OK')"
          python -c "from app.db import init; init(); print('DB init: OK')"

      - name: Verify dispatch strategy
        run: |
          cd services/dispatch-service
          python -c "
          from app.matching import NearestMatcher, CredibilityWeightedMatcher, RoundRobinMatcher, matcher
          import os
          rs = [{'id':'r1','lat':4.05,'lon':9.77,'credibility':0.9},
                {'id':'r2','lat':4.06,'lon':9.78,'credibility':0.8},
                {'id':'r3','lat':4.04,'lon':9.76,'credibility':0.7}]
          p = NearestMatcher().pick(4.0500,9.7700,rs)
          assert p is not None, 'NearestMatcher failed'
          p2 = CredibilityWeightedMatcher().pick(4.0500,9.7700,rs)
          assert p2 is not None, 'CredibilityMatcher failed'
          rr = RoundRobinMatcher()
          p3 = rr.pick(0,0,rs); p4 = rr.pick(0,0,rs)
          assert p3['id'] != p4['id'] or len(rs)==1, 'RoundRobin failed'
          print('All matchers: OK')
          "

  # ── 3. Build & push Docker images ────────────────────────────────────────
  build:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        service:
          - user-service
          - sos-service
          - dispatch-service
          - notification-service
          - analytics-service

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: services/${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Helm chart validation ───────────────────────────────────────────────
  helm-lint:
    name: Helm lint
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Build helm dependencies
        run: helm dependency build helm/

      - name: Helm lint
        run: helm lint helm/ --strict

      - name: Helm template (dry-run)
        run: helm template helep helm/ --namespace helep > /dev/null

  # ── 5. Deploy to cluster (main branch only) ───────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build, helm-lint]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Apply namespace and base resources
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/kafka/

      - name: Build and deploy Helm chart
        run: |
          helm dependency build helm/
          helm upgrade --install helep helm/ \
            --namespace helep \
            --create-namespace \
            --set global.imageTag=sha-${{ github.sha }} \
            --wait --timeout 5m

      - name: Apply network policies and ingress
        run: |
          kubectl apply -f k8s/network-policy.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Verify rollout
        run: |
          kubectl rollout status deployment -n helep --timeout=5m
