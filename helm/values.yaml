# Umbrella chart values — override per sub-chart
global:
  imageRegistry: ghcr.io/1doulos
  imageTag: latest
  kafkaBootstrap: helep-kafka-kafka-bootstrap:9092
  jwtSecret: ""          # injected via Secret (see k8s/secrets.yaml)

user-service:
  replicaCount: 2
  image:
    repository: ghcr.io/1doulos/user-service
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 8001
  env:
    SERVICE_PORT: "8001"
    MATCHER: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  persistence:
    enabled: true
    size: 1Gi
    storageClass: standard

