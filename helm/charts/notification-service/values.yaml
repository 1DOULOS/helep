replicaCount: 1
image:
  repository: ghcr.io/1doulos/notification-service
  tag: latest
  pullPolicy: IfNotPresent
service:
  port: 8004
env: {}
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi
autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
persistence:
  enabled: true
  size: 1Gi
  storageClass: standard
